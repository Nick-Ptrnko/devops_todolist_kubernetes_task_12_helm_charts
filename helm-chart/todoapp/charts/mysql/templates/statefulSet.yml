apiVersion: apps/v1
kind: StatefulSet
metadata:
#  name: mysql
  name: {{ .Chart.Name }}
#  namespace: mysql
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
#      app: mysql
      app: {{ .Chart.Name }}
#  replicas: 2
  replicas: {{ .Values.replicas }}
#  serviceName: mysql
  serviceName: {{ .Chart.Name }}
  template:
    metadata:
      labels:
#        app: mysql
        app: {{ .Chart.Name }}
    spec:
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
#      tolerations:
#      - key: "app"
#        operator: "Equal"
#        value: "mysql"
#        effect: "NoSchedule"
#      affinity:
#        nodeAffinity:
#          requiredDuringSchedulingIgnoredDuringExecution:
#            nodeSelectorTerms:
#            - matchExpressions:
#              - key: app
#                operator: In
#                values:
#                - mysql
#        podAntiAffinity:
#          requiredDuringSchedulingIgnoredDuringExecution:
#          - labelSelector:
#              matchExpressions:
#              - key: app
#                operator: In
#                values:
#                - mysql
#            topologyKey: "kubernetes.io/hostname"
      containers:
#      - name: mysql
      - name: {{ .Chart.Name }}
#        image: mysql:8.0
        image: {{ .Values.image.name }}:{{ .Values.image.tag }}
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
#              name: mysql-secrets
              name: {{ .Chart.Name }}-secrets
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Chart.Name }}-secrets
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Chart.Name }}-secrets
              key: MYSQL_PASSWORD
        - name: MYSQL_DATABASE
          value: app_db
        ports:
        - name: mysql
          containerPort: 3306
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
          subPath: mysql
        - name: config-map
          mountPath: /docker-entrypoint-initdb.d
#        resources:
#          requests:
#            cpu: 500m
#            memory: 1Gi
        resources:
           requests:
             memory: {{ .Values.requests.memory }}
             cpu: {{ .Values.requests.cpu }}
           limits:
             memory: {{ .Values.limits.memory }}
             cpu: {{ .Values.limits.cpu }}
        livenessProbe:
          exec:
            command: ["mysqladmin", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command: ["mysqladmin", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 2
          timeoutSeconds: 1
      volumes:
      - name: config-map
        configMap:
#          name: mysql
          name: {{ .Chart.Name }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
#          storage: 2Gi
          storage: {{ .Values.pvc }}
