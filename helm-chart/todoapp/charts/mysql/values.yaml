namespace: mysql

replicas: 2

image:
  name: mysql
  tag: 8.0

pvc: 2Gi

requests:
  memory: 0.7Gi
  cpu: 300m
limits:
  memory: 1Gi
  cpu: 500m

configs:
  MYSQL_ROOT_PASSWORD: "1234"
  MYSQL_USER: "app_user"
  MYSQL_PASSWORD: "1234"

tolerations:
  - key: "app"
    operator: "Equal"
    value: "mysql"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - mysql
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - mysql
        topologyKey: "kubernetes.io/hostname"

