apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
#  name: todoapp
  name: {{ .Chart.Name }}-hpa
#  namespace: todoapp
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
#    name: todoapp
    name: {{ .Chart.Name }}
#  minReplicas: 2
#  maxReplicas: 5
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
#        averageUtilization: 70
        averageUtilization: {{ .Values.hpa.cpuUtilization }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
#        averageUtilization: 70
        averageUtilization: {{ .Values.hpa.memoryUtilization }}
