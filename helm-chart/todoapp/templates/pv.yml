apiVersion: v1
kind: PersistentVolume
metadata:
#  name: pv-data
  name: {{ .Chart.Name }}-pv
#  namespace: todoapp
  namespace: {{ .Values.namespace }}
spec:
  storageClassName: standard
  persistentVolumeReclaimPolicy: Delete
  accessModes:
    - ReadWriteMany
  capacity:
#    storage: 1Gi
    storage: {{ .Values.pv.capacity }}
  hostPath:
    path: /data/
