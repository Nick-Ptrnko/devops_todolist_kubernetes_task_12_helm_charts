apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  # Префікс .Chart.Name для імені ресурсу
  name: {{ .Chart.Name }}-role
  namespace: {{ .Values.namespace }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  # Префікс .Chart.Name для імені ресурсу
  name: {{ .Chart.Name }}-rolebinding
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  # Назва ServiceAccount контролюється з values.yaml
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: {{ .Chart.Name }}-role
  apiGroup: rbac.authorization.k8s.io
